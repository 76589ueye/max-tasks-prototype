version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: maxtasks-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: maxtasks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: maxtasks-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@maxtasks.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
