name: Max Tasks CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Generate Prisma Client
        run: npm run build -w services/api
      - name: Run API Tests
        run: npm run test -w services/api

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build Web App
        run: npm run build -w apps/web

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Unsigned iOS App (.app)
        run: xcodebuild -project apps/ios/MaxTasks.xcodeproj -scheme MaxTasks -sdk iphoneos -configuration Release CONFIGURATION_BUILD_DIR=../../build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/MaxTasks.app Payload/
          zip -r MaxTasks.ipa Payload/

      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v3
        with:
          name: MaxTasks-Unsigned-IPA
          path: MaxTasks.ipa
