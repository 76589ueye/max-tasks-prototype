name: Max Tasks CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: maxtasks
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/maxtasks?schema=public
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build Shared Types
        run: npm run build -w shared-types
      - name: Generate Prisma Client & Migrate
        run: |
          npx prisma migrate deploy --schema=services/api/prisma/schema.prisma
          npm run build -w services/api
      - name: Run API Tests
        run: npm run test -w services/api

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build Shared Types
        run: npm run build -w shared-types
      - name: Build Web App
        run: npm run build -w apps/web

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Unsigned iOS App (.app)
        run: xcodebuild -project apps/ios/MaxTasks.xcodeproj -scheme MaxTasks -sdk iphoneos -configuration Release CONFIGURATION_BUILD_DIR=../../build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/MaxTasks.app Payload/
          zip -r MaxTasks.ipa Payload/

      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaxTasks-Unsigned-IPA
          path: MaxTasks.ipa
